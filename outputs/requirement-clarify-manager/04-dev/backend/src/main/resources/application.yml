spring:
  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://localhost:5432/clarify_manager
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jooq:
  sql-dialect: postgres

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
